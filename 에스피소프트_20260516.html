<style>

    --uplus-pink: #79C0FF;
    --uplus-deep: #388BFD;
    --bg-primary: #0D1117;
    --bg-card: #161B22;
    --bg-card-hover: #1C2128;
    --text-primary: #E6EDF3;
    --text-secondary: #8B949E;
    --text-muted: #6E7681;
    --border: #30363D;
    --buy: #3FB950;
    --sell: #F47067;
    --hold: #D29922;
    --target1: #57AB5A;
    --target2: #58A6FF;
    --target3: #BC8CFF;
    --stoploss: #F47067;
    --axis-fund: #58A6FF;
    --axis-val: #79C0FF;
    --axis-tech: #BC8CFF;
    --axis-ai: #56D4DD;
    --axis-risk: #F47067;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Pretendard Variable', -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container { max-width: 1280px; margin: 0 auto; padding: 24px 20px; }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    position: relative;
  }
  .header::before {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--uplus-magenta), transparent);
  }
  .header-label {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--uplus-magenta);
    background: rgba(88, 166, 255, 0.1);
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid rgba(88, 166, 255, 0.25);
    margin-bottom: 16px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .header .date {
    font-size: 16px;
    color: var(--text-secondary);
    font-weight: 400;
  }

  /* Verdict Banner */
  .verdict-banner {
    text-align: center;
    padding: 28px;
    border-radius: 16px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }
  .verdict-banner::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.08;
    border-radius: 16px;
  }
  .verdict-banner.buy { background: rgba(63,185,80,0.08); border: 1px solid rgba(63,185,80,0.3); }
  .verdict-banner.sell { background: rgba(244,112,103,0.08); border: 1px solid rgba(244,112,103,0.3); }
  .verdict-banner.hold { background: rgba(210,153,34,0.08); border: 1px solid rgba(210,153,34,0.3); }
  .verdict-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .verdict-banner.buy .verdict-label { color: var(--buy); }
  .verdict-banner.sell .verdict-label { color: var(--sell); }
  .verdict-banner.hold .verdict-label { color: var(--hold); }
  .verdict-text {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .verdict-banner.buy .verdict-text { color: var(--buy); }
  .verdict-banner.sell .verdict-text { color: var(--sell); }
  .verdict-banner.hold .verdict-text { color: var(--hold); }
  .verdict-votes {
    font-size: 14px;
    color: var(--text-secondary);
  }
  .verdict-votes .v-buy { color: var(--buy); font-weight: 700; }
  .verdict-votes .v-hold { color: var(--hold); font-weight: 700; }
  .verdict-votes .v-sell { color: var(--sell); font-weight: 700; }

  /* Price Target Gauge */
  .price-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 28px;
  }
  .price-section h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .price-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
  }
  .price-table th {
    text-align: left;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 600;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .price-table td {
    padding: 10px 12px;
    font-size: 14px;
    border-bottom: 1px solid rgba(48,54,61,0.5);
  }
  .price-table .price-val { font-weight: 700; font-size: 16px; }
  .price-table .pct-up { color: var(--buy); font-weight: 600; }
  .price-table .pct-down { color: var(--sell); font-weight: 600; }
  .price-bar-wrap {
    position: relative;
    height: 40px;
    background: rgba(48,54,61,0.5);
    border-radius: 8px;
    overflow: visible;
    margin: 24px 0 40px;
  }
  .price-marker {
    position: absolute;
    top: -6px;
    width: 3px;
    height: 52px;
    border-radius: 2px;
    z-index: 2;
  }
  .price-marker-label {
    position: absolute;
    top: 52px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    font-weight: 600;
    white-space: nowrap;
  }
  .price-marker.current { background: var(--text-primary); }
  .price-marker.stoploss { background: var(--stoploss); }
  .price-marker.target1 { background: var(--target1); }
  .price-marker.target2 { background: var(--target2); }
  .price-marker.target3 { background: var(--target3); }

  /* Timing Signals */
  .timing-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 28px;
  }
  .timing-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .timing-header h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .timing-verdict {
    font-size: 14px;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 12px;
  }
  .timing-verdict.go { background: rgba(63,185,80,0.12); color: var(--buy); border: 1px solid rgba(63,185,80,0.3); }
  .timing-verdict.wait { background: rgba(210,153,34,0.12); color: var(--hold); border: 1px solid rgba(210,153,34,0.3); }
  .signal-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .signal-card {
    background: rgba(48,54,61,0.3);
    border-radius: 10px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .signal-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .signal-icon.met { background: rgba(63,185,80,0.15); color: var(--buy); }
  .signal-icon.unmet { background: rgba(110,118,129,0.15); color: var(--text-muted); }
  .signal-name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .signal-value { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* Charts Row */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 28px;
  }
  .chart-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }
  .chart-card h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .chart-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 260px;
  }
  .chart-wrap canvas { max-height: 260px; }

  /* Fundamentals & Valuation Cards */
  .metrics-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 28px;
  }
  .metric-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }
  .metric-card h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .metric-table {
    width: 100%;
    border-collapse: collapse;
  }
  .metric-table th {
    text-align: left;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
  }
  .metric-table td {
    padding: 8px;
    font-size: 13px;
    border-bottom: 1px solid rgba(48,54,61,0.4);
  }
  .verdict-chip {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 8px;
  }
  .verdict-chip.good { background: rgba(63,185,80,0.12); color: var(--buy); }
  .verdict-chip.neutral { background: rgba(210,153,34,0.12); color: var(--hold); }
  .verdict-chip.bad { background: rgba(244,112,103,0.12); color: var(--sell); }

  /* Guru Cards */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .guru-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }
  .guru-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .guru-card:hover {
    border-color: rgba(88,166,255,0.3);
    transform: translateY(-2px);
  }
  .guru-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .guru-name { font-size: 16px; font-weight: 700; }
  .guru-style { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .guru-verdict {
    font-size: 13px;
    font-weight: 800;
    padding: 4px 12px;
    border-radius: 10px;
  }
  .guru-verdict.buy { background: rgba(63,185,80,0.12); color: var(--buy); border: 1px solid rgba(63,185,80,0.25); }
  .guru-verdict.sell { background: rgba(244,112,103,0.12); color: var(--sell); border: 1px solid rgba(244,112,103,0.25); }
  .guru-verdict.hold { background: rgba(210,153,34,0.12); color: var(--hold); border: 1px solid rgba(210,153,34,0.25); }
  .guru-confidence {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .guru-reasons {
    list-style: none;
    margin-bottom: 12px;
  }
  .guru-reasons li {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
    padding-left: 14px;
    position: relative;
    margin-bottom: 4px;
  }
  .guru-reasons li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 8px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--uplus-magenta);
    opacity: 0.5;
  }
  .guru-target {
    font-size: 12px;
    color: var(--text-muted);
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .guru-target strong { color: var(--uplus-pink); }

  /* AI Relevance */
  .ai-section {
    background: linear-gradient(135deg, rgba(86,212,221,0.06), rgba(88,166,255,0.06));
    border: 1px solid rgba(86,212,221,0.2);
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 28px;
  }
  .ai-section h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--axis-ai);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .ai-alliance {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .ai-axes {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .ai-axis-card {
    background: rgba(13,17,23,0.5);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }
  .ai-axis-name { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
  .ai-axis-score { font-size: 20px; margin-bottom: 4px; }
  .ai-axis-note { font-size: 11px; color: var(--text-muted); }

  /* Risks */
  .risk-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .risk-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    border-left: 3px solid;
  }
  .risk-card.high { border-left-color: var(--sell); }
  .risk-card.mid { border-left-color: var(--hold); }
  .risk-card.low { border-left-color: var(--buy); }
  .risk-type {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .risk-card.high .risk-type { color: var(--sell); }
  .risk-card.mid .risk-type { color: var(--hold); }
  .risk-card.low .risk-type { color: var(--buy); }
  .risk-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
  .risk-meta { font-size: 11px; color: var(--text-muted); margin-top: 8px; }

  /* Disclaimer */
  .disclaimer {
    background: rgba(244,112,103,0.05);
    border: 1px solid rgba(244,112,103,0.15);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 28px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .disclaimer strong { color: var(--sell); }

  /* Footer */
  .footer {
    text-align: center;
    padding: 24px 0;
    border-top: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 12px;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .charts-row, .metrics-row { grid-template-columns: 1fr; }
    .guru-grid { grid-template-columns: 1fr; }
    .signal-grid { grid-template-columns: 1fr 1fr; }
    .ai-axes { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 600px) {
    .container { padding: 16px 12px; }
    .header h1 { font-size: 22px; }
    .verdict-text { font-size: 28px; }
    .signal-grid { grid-template-columns: 1fr; }
  }
</style>

// ===== HELPERS =====
const fmt = (n, cur) => {
  if (cur === 'USD') return '$' + n.toLocaleString('en-US');
  return '₩' + n.toLocaleString('ko-KR');
};
const pct = (n) => (n > 0 ? '+' : '') + n + '%';
function verdictClass(v) {
  v = v.toUpperCase();
  if (v.includes('BUY')) return 'buy';
  if (v.includes('SELL')) return 'sell';
  return 'hold';
}
function chipClass(v) {
  const s = (v || '').toString();
  if (['우수','양호','매력적','저평가','안정'].some(k => s.includes(k))) return 'good';
  if (['위험','고평가','부정적','과대','취약'].some(k => s.includes(k))) return 'bad';
  return 'neutral';
}

const allPrices = [pt.stopLoss.price, D.currentPrice, pt.buyPrice, pt.target1.price, pt.target2.price, pt.target3.price];
const minP = Math.min(...allPrices) * 0.95;
const maxP = Math.max(...allPrices) * 1.05;
const range = maxP - minP;
function barPos(price) { return ((price - minP) / range * 100).toFixed(1) + '%'; }

  { price: pt.stopLoss.price, cls: 'stoploss', label: '손절 ' + fmt(pt.stopLoss.price, cur) },

    <td><span class="verdict-chip ${chipClass(v.verdict)}">${v.verdict}</span></td></tr>
  `).join('')}
`;

// ===== VALUATION =====
const val = D.valuation;
document.getElementById('val-table').innerHTML = `
  <tr><th>지표</th><th>현재</th><th>5년 평균</th><th>동종업계</th><th>판정</th></tr>
  ${Object.entries(val).map(([k, v]) => `
    <tr><td>${k.toUpperCase()}</td>
    <td style="font-weight:600">${v.current || v.value || '—'}</td>
    <td>${v.avg5y || '—'}</td>
    <td>${v.peer || '—'}</td>
    <td><span class="verdict-chip ${chipClass(v.verdict)}">${v.verdict}</span></td></tr>
  `).join('')}
`;

// ===== AI RELEVANCE =====
document.getElementById('ai-alliance').innerHTML = 'Alliance Rating: ' + D.aiRelevance.allianceRating;
const axisNames = { AIDC: 'AIDC 인프라', AICC: 'AICC SaaS', SovereignAI: 'Sovereign AI', AX: 'AX 사업화' };
document.getElementById('ai-axes').innerHTML = Object.entries(D.aiRelevance.axes).map(([k, v]) => `
  <div class="ai-axis-card">
    <div class="ai-axis-name">${axisNames[k] || k}</div>
    <div class="ai-axis-score">${v.score}</div>
    <div class="ai-axis-note">${v.note}</div>
  </div>
`).join('');

// ===== GURU CARDS =====
document.getElementById('guru-grid').innerHTML = D.gurus.map(g => `
  <div class="guru-card">
    <div class="guru-header">
      <div>
        <div class="guru-name">${g.name}</div>
        <div class="guru-style">${g.style}</div>
      </div>
      <span class="guru-verdict ${verdictClass(g.verdict)}">${g.verdict}</span>
    </div>
    <div class="guru-confidence">Confidence: ${g.confidence}</div>
    <ul class="guru-reasons">
      ${g.reasons.map(r => `<li>${r}</li>`).join('')}
    </ul>
    <div class="guru-target"><strong>Target:</strong> ${fmt(g.target, D.currency)}</div>
  </div>
`).join('');

// ===== RISKS =====
function riskLevel(impact) {
  if (impact === '높음') return 'high';
  if (impact === '중간') return 'mid';
  return 'low';
}
document.getElementById('risk-grid').innerHTML = D.risks.map(r => `
  <div class="risk-card ${riskLevel(r.impact)}">
    <div class="risk-type">${r.type} Risk</div>
    <div class="risk-desc">${r.desc}</div>
    <div class="risk-meta">Impact: ${r.impact} · Probability: ${r.probability}</div>
  </div>
`).join('');

// ===== DISCLAIMER =====
document.getElementById('disclaimer').innerHTML = '<strong>Disclaimer:</strong> ' + D.disclaimer;
</script>
</body>
</html>
