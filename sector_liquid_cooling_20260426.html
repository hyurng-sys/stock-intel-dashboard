});

// Sources
const stb = document.querySelector('#sourcesTable tbody');
(D.sources || []).forEach((s,i)=>{
  const tr = document.createElement('tr');
  const url = s.url ? `<a href="${s.url}" target="_blank" style="color:var(--accent)">${s.url}</a>` : (s.source || '-');
  tr.innerHTML = `<td>${i+1}</td><td>${s.type || '-'}</td><td>${url}</td><td>${s.info || '-'}</td>`;
  stb.appendChild(tr);
});

document.getElementById('disclaimer').textContent = D.disclaimer || '본 분석은 AI 에이전트가 공개 정보를 기반으로 생성한 참고 자료이며, 투자 자문이 아닙니다. 모든 투자 결정은 투자자 본인의 판단과 책임 하에 이루어져야 합니다.';

// Bubble chart — 시총(x) vs 1년 수익률(y) vs AI 익스포저 가중치(r)
const aiWeight = (s)=>({'◎':14,'○':10,'△':6,'✕':3}[s]||5);
const parseNum = (s)=>{
  if(!s) return null;
  const m = String(s).match(/-?[\d,.]+/);
  if(!m) return null;
  return parseFloat(m[0].replace(/,/g,''));
};
const bubData = D.pool.map(s=>({
  x: parseNum(s.marketCap) || 0,
  y: parseNum(s.return1y) || 0,
  r: aiWeight(s.aiExposure),
  label: s.ticker,
  market: s.market
})).filter(d=>d.x);
const ctx = document.getElementById('bubble').getContext('2d');
new Chart(ctx, {
  type:'bubble',
  data:{datasets:[
    {label:'미국', data:bubData.filter(d=>d.market!=='JP'), backgroundColor:'rgba(91,157,255,0.6)', borderColor:'#5b9dff', borderWidth:1},
    {label:'일본', data:bubData.filter(d=>d.market==='JP'), backgroundColor:'rgba(239,68,68,0.6)', borderColor:'#ef4444', borderWidth:1}
  ]},
  options:{
    responsive:true, maintainAspectRatio:false,
    plugins:{
      legend:{labels:{color:'#e6e8ec'}},
      tooltip:{callbacks:{label:(c)=>`${c.raw.label}: 시총 ${c.raw.x}, 1Y ${c.raw.y}%`}}
    },
    scales:{
      x:{title:{display:true,text:'시가총액 (단위: 입력 그대로)',color:'#9aa3b2'},ticks:{color:'#9aa3b2'},grid:{color:'rgba(255,255,255,0.05)'}},
      y:{title:{display:true,text:'1년 수익률 (%)',color:'#9aa3b2'},ticks:{color:'#9aa3b2'},grid:{color:'rgba(255,255,255,0.05)'}}
    }
  }
});
</script>
</body>
</html>
