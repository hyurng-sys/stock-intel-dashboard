  }

    opacity: 0.08;

  }
  .verdict-banner.buy { background: rgba(63,185,80,0.08); border: 1px solid rgba(63,185,80,0.3); }
  .verdict-banner.sell { background: rgba(244,112,103,0.08); border: 1px solid rgba(244,112,103,0.3); }
  .verdict-banner.hold { background: rgba(210,153,34,0.08); border: 1px solid rgba(210,153,34,0.3); }
  .verdict-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .verdict-banner.buy .verdict-label { color: var(--buy); }
  .verdict-banner.sell .verdict-label { color: var(--sell); }
  .verdict-banner.hold .verdict-label { color: var(--hold); }
  .verdict-text {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .verdict-banner.buy .verdict-text { color: var(--buy); }
  .verdict-banner.sell .verdict-text { color: var(--sell); }
  .verdict-banner.hold .verdict-text { color: var(--hold); }
  .verdict-votes {
    font-size: 14px;
    color: var(--text-secondary);
  }
  .verdict-votes .v-buy { color: var(--buy); font-weight: 700; }
  .verdict-votes .v-hold { color: var(--hold); font-weight: 700; }
  .verdict-votes .v-sell { color: var(--sell); font-weight: 700; }

  /* Price Target Gauge */
  .price-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 28px;
  }
  .price-section h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 20px;

  .price-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
  }
  .price-table th {
    text-align: left;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 600;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .price-table td {

    font-size: 14px;
    border-bottom: 1px solid rgba(48,54,61,0.5);

  .price-table .price-val { font-weight: 700; font-size: 16px; }
  .price-table .pct-up { color: var(--buy); font-weight: 600; }
  .price-table .pct-down { color: var(--sell); font-weight: 600; }
  .price-bar-wrap {

    height: 40px;
    background: rgba(48,54,61,0.5);
    border-radius: 8px;
    overflow: visible;
    margin: 24px 0 40px;
  }
  .price-marker {
    position: absolute;
    top: -6px;
    width: 3px;
    height: 52px;
    border-radius: 2px;
    z-index: 2;
  }
  .price-marker-label {
    position: absolute;
    top: 52px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    font-weight: 600;
    white-space: nowrap;
  }
  .price-marker.current { background: var(--text-primary); }
  .price-marker.stoploss { background: var(--stoploss); }
  .price-marker.target1 { background: var(--target1); }
  .price-marker.target2 { background: var(--target2); }
  .price-marker.target3 { background: var(--target3); }

  /* Timing Signals */
  .timing-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 28px;
  }
  .timing-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .timing-header h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .timing-verdict {
    font-size: 14px;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 12px;

  .timing-verdict.wait { background: rgba(210,153,34,0.12); color: var(--hold); border: 1px solid rgba(210,153,34,0.3); }

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .signal-card {
    background: rgba(48,54,61,0.3);
    border-radius: 10px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .signal-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;

  .signal-value { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    gap: 24px;
    margin-bottom: 28px;

    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;

    text-transform: uppercase;
    margin-bottom: 16px;

    align-items: center;

  .metrics-row {

    background: var(--bg-card);

  .verdict-chip.bad { background: rgba(244,112,103,0.12); color: var(--sell); }

  .section-title {

    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;

    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);

    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 28px;

    padding: 20px;

    margin-bottom: 12px;

    width: 5px;
    height: 5px;

    background: var(--uplus-magenta);

  @media (max-width: 600px) {

    .header h1 { font-size: 22px; }
    .verdict-text { font-size: 28px; }
    .signal-grid { grid-template-columns: 1fr; }
  }

// ===== HELPERS =====
const fmt = (n, cur) => {
  if (cur === 'USD') return '$' + n.toLocaleString('en-US');
  return '₩' + n.toLocaleString('ko-KR');
};
const pct = (n) => (n > 0 ? '+' : '') + n + '%';
function verdictClass(v) {
  v = v.toUpperCase();
  if (v.includes('BUY')) return 'buy';
  if (v.includes('SELL')) return 'sell';
  return 'hold';
}
function chipClass(v) {
  const s = (v || '').toString();
  if (['우수','양호','매력적','저평가','안정'].some(k => s.includes(k))) return 'good';
  if (['위험','고평가','부정적','과대','취약'].some(k => s.includes(k))) return 'bad';
  return 'neutral';
}

      <span class="guru-verdict ${verdictClass(g.verdict)}">${g.verdict}</span>
    </div>
    <div class="guru-confidence">Confidence: ${g.confidence}</div>
    <ul class="guru-reasons">
      ${g.reasons.map(r => `<li>${r}</li>`).join('')}
    </ul>
    <div class="guru-target"><strong>Target:</strong> ${fmt(g.target, D.currency)}</div>
  </div>
`).join('');

// ===== RISKS =====
function riskLevel(impact) {
  if (impact === '높음') return 'high';
  if (impact === '중간') return 'mid';
  return 'low';
}
document.getElementById('risk-grid').innerHTML = D.risks.map(r => `
  <div class="risk-card ${riskLevel(r.impact)}">
    <div class="risk-type">${r.type} Risk</div>
    <div class="risk-desc">${r.desc}</div>
    <div class="risk-meta">Impact: ${r.impact} · Probability: ${r.probability}</div>
  </div>
`).join('');

// ===== DISCLAIMER =====
document.getElementById('disclaimer').innerHTML = '<strong>Disclaimer:</strong> ' + D.disclaimer;
</script>
</body>
</html>
